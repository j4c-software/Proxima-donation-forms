<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Give — Proxima Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: transparent;
      padding: 32px 16px 48px;
    }

    .donate-wrapper {
      max-width: 680px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    /* ── Header ── */
    .donate-header {
      background: #ffffff;
      padding: 36px 40px 28px;
      text-align: center;
    }

    .donate-header .logo {
      display: block;
      height: 52px;
      width: auto;
      margin: 0 auto 20px;
    }

    .donate-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1.2;
      margin-bottom: 8px;
      color: #05718D;
    }

    .donate-header p {
      font-size: 0.88rem;
      font-weight: 400;
      color: #5a7280;
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto;
    }

    .donate-header .accent-bar {
      display: flex;
      gap: 6px;
      margin-top: 18px;
      justify-content: center;
    }

    .donate-header .accent-bar span {
      display: inline-block;
      height: 4px;
      border-radius: 2px;
      background: #F2B41E;
    }

    .donate-header .accent-bar span:first-child { width: 180px; }
    .donate-header .accent-bar span:last-child  { width: 60px; opacity: 0.5; }

    /* ── Body ── */
    .donate-body {
      padding: 0 40px 36px;
    }


    /* ── Footer ── */
    .donate-footer {
      border-top: 1px solid #e8edf0;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #9aabb5;
      letter-spacing: 0.01em;
    }

    .donate-footer a {
      color: #05718D;
      text-decoration: none;
    }

    .donate-footer .lock {
      font-size: 0.72rem;
      opacity: 0.7;
    }

    @media (max-width: 520px) {
      body { padding: 0; }
      .donate-wrapper { border-radius: 0; box-shadow: none; }
      .donate-header { padding: 24px 20px 20px; }
      .donate-body { padding: 0 20px 28px; }
      .donate-footer { padding: 14px 20px; flex-wrap: wrap; text-align: center; }
      .donate-header .accent-bar span:first-child { width: 120px; }
    }
  </style>
</head>
<body>
  <div class="donate-wrapper">

    <div class="donate-header">
      <img
        class="logo"
        src="https://cdn.virtuoussoftware.com/cdn/8106/images/Proxima-only_logo_color.png"
        alt="Proxima Partners"
      />
      <h1>Support Our Mission</h1>
      <p>Your generosity makes it possible for us to offer free, personalized coaching to people of all backgrounds in San Francisco.</p>
      <div class="accent-bar">
        <span></span>
        <span></span>
      </div>
    </div>

    <div class="donate-body">
      <script
        src="https://cdn.virtuoussoftware.com/virtuous.embed.min.js"
        data-vform="EC2B5B25-B5D3-4B4F-97A4-498DBEDE4298"
        data-orgId="8106"
        data-isGiving="true"
        data-merchantType="StripeUnified"
        data-dependencies="[]">
      </script>
    </div>

    <div class="donate-footer">
      <span class="lock">🔒</span>
      Secure donation processed by <a href="https://stripe.com" target="_blank">Stripe</a>
      &nbsp;·&nbsp;
      Questions? <a href="mailto:info@liveproxima.org">info@liveproxima.org</a>
    </div>

  </div>
  <script>
    // Auto-resize: notify parent iframe of document height changes
    function sendHeight() {
      const height = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: 'iframeResize', height: height }, '*');
    }
    const ro = new ResizeObserver(sendHeight);
    ro.observe(document.body);
    sendHeight();
  </script>
</body>
</html>
